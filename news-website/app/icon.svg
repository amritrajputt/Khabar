<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Neo-Brutalist Hard Drop Shadow (Solid Black) -->
  <rect x="44" y="44" width="416" height="416" rx="36" fill="#000000" />
  
  <!-- Main Badge (Yellow #E5C158 with Thick Black Border) -->
  <rect x="20" y="20" width="416" height="416" rx="36" fill="#E5C158" stroke="#000000" stroke-width="24" stroke-linejoin="miter" />
  
  <!-- Skewed Inner Black Badge -->
  <g transform="rotate(-6, 228, 228)">
    <rect x="73" y="73" width="310" height="310" rx="24" fill="#000000" />
    
    <!-- Bold 'K' Typography with Yellow Accent Shadow -->
    <text x="238" y="306" font-family="'Arial Black', 'Impact', 'Trebuchet MS', sans-serif" font-weight="900" font-size="220" text-anchor="middle" fill="#E5C158">K</text>
    <text x="228" y="296" font-family="'Arial Black', 'Impact', 'Trebuchet MS', sans-serif" font-weight="900" font-size="220" text-anchor="middle" fill="#FFFFFF">K</text>
  </g>
  
  <!-- Breaking News Red Dot Indicator (Top Right) -->
  <circle cx="408" cy="72" r="28" fill="#000000" />
  <circle cx="408" cy="72" r="21" fill="#EB2D2D" />
</svg>